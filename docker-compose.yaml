services:
    php:
        build: 
            context: ./php
        ports:
            - "8080:80"
        volumes:
            - ./public:/var/www/html

    database:
        image: mysql:8.0
        environment:
            MYSQL_ROOT_PASSWORD: secret
            MYSQL_DATABASE: allocine
            MYSQL_USER: app
            MYSQL_PASSWORD: azerty33
        volumes:
            - mysql_data:/var/lib/mysql

    phpmyadmin:
        image: phpmyadmin
        ports:
            - "8081:80"
        environment:
            PMA_HOST: database
            PMA_PORT: 3306
        depends_on:
            - database

    mailpit:
        image: axllent/mailpit
        ports:
            - "8025:8025"
            - "1025:1025"

volumes:
    mysql_data: